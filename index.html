<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.B.O. | Governança Térmica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .dashboard-container {
            font-family: 'Inter', system-ui, sans-serif;
            background: #FFFFFF;
            color: #111111;
            min-height: 100vh;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .dash-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #EBEBEB;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dash-logo-text {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        /* Sidebar */
        .sidebar-menu {
            position: fixed;
            left: -320px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: #FFFFFF;
            border-right: 1px solid #EBEBEB;
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.05);
            transition: left 0.5s cubic-bezier(0.8, 0, 0.1, 1);
            z-index: 200;
            padding-top: 80px;
        }

        .sidebar-menu.open { left: 0; }

        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            color: #666;
            text-decoration: none;
            transition: all 0.4s ease;
        }

        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(0, 0, 0, 0.03);
            color: #000;
        }

        /* Mapa Galáxia */
        .galaxy-map-container {
            position: relative;
            height: 82vh;
            background: #F8F9FA;
            border-radius: 20px;
            overflow: hidden;
            margin: 2rem;
            box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.02);
            border: 1px solid #EBEBEB;
        }

        .live-pulse {
            width: 8px; height: 8px;
            background-color: #00C853;
            border-radius: 50%;
            margin-left: 10px;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 200, 83, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 200, 83, 0); }
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFF;
            font-weight: 600;
            transition: all 0.5s ease;
            cursor: pointer;
        }

        .bubble.green { background: rgba(0, 0, 0, 0.9); }
        .bubble.red { background: rgba(255, 59, 92, 0.9); animation: pulse-red 1s infinite; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 92, 0.7); }
            100% { box-shadow: 0 0 0 15px rgba(255, 59, 92, 0); }
        }

        .kpi-card {
            background: #FFFFFF;
            border: 1px solid #EBEBEB;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .kpi-val.green { color: #000; }
        .nr17-stamp {
            display: inline-flex;
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid #000;
            background: rgba(0, 0, 0, 0.05);
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <header class="site-header">
        <div class="logo">A.R.B.O.</div>
        <nav class="nav-links">
            <a href="#login" class="nav-link corporate-login">Login Corporativo</a>
        </nav>
    </header>

    <main class="content-layer">
        <section class="panel hero">
            <div class="hero-content reveal">
                <h1 class="hero-title">A.R.B.O.</h1>
                <p class="hero-subtitle">A Evolução da Governança Térmica.</p>
                <div class="product-showcase-container reveal" style="margin-top: 4rem;">
                    <img src="assets/hero-produto.jpg" alt="A.R.B.O." style="max-width: 400px; border-radius: 20px;">
                </div>
            </div>
        </section>
    </main>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>
            <div class="modal-header">
                <h2>Acesso Corporativo</h2>
                <p>Insira seu token para monitorar sua unidade em Manaus.</p>
            </div>
            <form id="loginForm" class="login-form">
                <input type="text" id="securityToken" placeholder="Token da Empresa" required style="text-align: center; text-transform: uppercase;">
                <button type="submit" class="submit-token">Autenticar</button>
            </form>
            <div id="loginFeedback" class="login-feedback"></div>
        </div>
    </div>

    <div id="corporateDashboard" class="dashboard-container" style="display: none;">
        <header class="dash-header">
            <div class="dash-logo-text">A.R.B.O. <span>CORPORATE</span> <span class="live-pulse"></span></div>
            <button id="logoutBtn" class="btn-sair" style="margin-left: auto;">Sair</button>
        </header>

        <div class="dash-content">
            <div id="view-overview" class="dash-view active-view" style="padding: 2rem;">
                <div class="nr17-stamp">● AMBIENTE CONFORME NR-17</div>
                
                <div class="kpi-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
                    <div class="kpi-card">
                        <span>ECONOMIA ACUMULADA</span>
                        <strong class="kpi-val green" id="roiValue">R$ 14.580,00</strong>
                    </div>
                    <div class="kpi-card">
                        <span>TEMPERATURA ATUAL</span>
                        <strong class="kpi-val dark" id="liveConsumptionValue">-- °C</strong>
                    </div>
                </div>

                <div id="galaxyMap" class="galaxy-map-container" style="margin-top: 2rem;">
                    </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // 1. CONFIGURAÇÃO SUPABASE
        const _supabaseUrl = 'https://zbnpwicdgobxkvesgayr.supabase.co';
        const _supabaseKey = 'sb_publishable_Bw_NeyC1z_bHKnKOYjns0w_wAiAw5Lc';
        const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

        const loginForm = document.getElementById('loginForm');
        const loginModal = document.getElementById('loginModal');
        const corporateDashboard = document.getElementById('corporateDashboard');
        const contentLayer = document.querySelector('.content-layer');

        // 2. LOGIN POR TOKEN (Busca na tabela 'empresas')
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const token = document.getElementById('securityToken').value.toUpperCase().trim();

                const { data: empresa, error } = await supabaseClient
                    .from('empresas')
                    .select('*')
                    .eq('id_acesso', token)
                    .single();

                if (empresa) {
                    loginModal.classList.remove('active');
                    contentLayer.style.display = 'none';
                    corporateDashboard.style.display = 'block';
                    document.querySelector('.site-header').style.display = 'none';
                    
                    // Inicia o monitoramento real do DHT11
                    conectarRealtime();
                } else {
                    document.getElementById('loginFeedback').innerHTML = '<span style="color:red;">Token inválido.</span>';
                }
            });
        }

        // 3. REALTIME: ESCUTA O ESP32
        function conectarRealtime() {
            console.log("A.R.B.O. conectado à nuvem...");

            // Criar bolinha inicial do RH no mapa
            const map = document.getElementById('galaxyMap');
            map.innerHTML = '<div id="bolha-rh" class="bubble green" style="width:100px; height:100px; left:20%; top:30%;">RH</div>';

            supabaseClient
                .channel('leituras-reais')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'leituras' }, payload => {
                    const leitura = payload.new;
                    
                    // Atualiza a Temperatura na tela
                    document.getElementById('liveConsumptionValue').innerHTML = `${leitura.temperatura} <span style="font-size:1.2rem;">°C</span>`;

                    // Alerta NR-17: Se > 25°C a bolinha fica vermelha
                    const bolha = document.getElementById('bolha-rh');
                    if (leitura.temperatura > 25) {
                        bolha.className = 'bubble red';
                    } else {
                        bolha.className = 'bubble green';
                    }

                    // Atualiza a economia (ROI) de forma reativa
                    let roiEl = document.getElementById('roiValue');
                    let valor = parseFloat(roiEl.innerText.replace('R$', '').replace('.', '').replace(',', '.'));
                    roiEl.innerText = (valor + 0.05).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                })
                .subscribe();
        }

        // Modal Controls
        document.querySelector('.corporate-login').addEventListener('click', () => loginModal.classList.add('active'));
        document.getElementById('closeModal').addEventListener('click', () => loginModal.classList.remove('active'));
        document.getElementById('logoutBtn').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
